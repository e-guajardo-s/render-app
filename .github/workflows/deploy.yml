# .github/workflows/deploy.yml
# Se dispara en cada push a la rama main
name: Deploy render-app to AWS

on:
  push:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build y deploy del FRONTEND a S3
  # ─────────────────────────────────────────────
  deploy-frontend:
    name: Frontend → S3 + CloudFront
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias frontend
        working-directory: frontend
        run: npm ci

      - name: Build React (Vite)
        working-directory: frontend
        env:
          # En producción la API está en el mismo dominio, baseURL queda vacío
          # y las peticiones /api/* llegan al ALB via CloudFront behavior
          VITE_API_BASE_URL: ""
        run: npm run build

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Subir build a S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ secrets.S3_BUCKET_FRONTEND }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          # index.html sin caché para que CloudFront siempre sirva la versión más nueva
          aws s3 cp frontend/dist/index.html s3://${{ secrets.S3_BUCKET_FRONTEND }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidar caché CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

  # ─────────────────────────────────────────────
  # JOB 2: Deploy del BACKEND a EC2 via CodeDeploy
  # ─────────────────────────────────────────────
  deploy-backend:
    name: Backend → EC2 (CodeDeploy)
    runs-on: ubuntu-latest
    needs: deploy-frontend   # Espera que el frontend pase primero

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Crear paquete de deployment
        run: |
          # Empaquetamos solo lo que necesita EC2: backend + appspec + scripts
          zip -r deploy.zip \
            backend/ \
            appspec.yml \
            infra/scripts/ \
            --exclude "backend/node_modules/*" \
            --exclude "backend/uploads/*" \
            --exclude "backend/.env"

      - name: Subir paquete a S3 (artefactos)
        run: |
          aws s3 cp deploy.zip \
            s3://${{ secrets.S3_BUCKET_ARTIFACTS }}/render-app/deploy-${{ github.sha }}.zip

      - name: Crear deployment en CodeDeploy
        run: |
          aws deploy create-deployment \
            --application-name render-app \
            --deployment-group-name render-app-prod \
            --s3-location bucket=${{ secrets.S3_BUCKET_ARTIFACTS }},key=render-app/deploy-${{ github.sha }}.zip,bundleType=zip \
            --deployment-config-name CodeDeployDefault.OneAtATime \
            --description "Deploy ${{ github.sha }}" \
            --auto-rollback-configuration enabled=true,events=DEPLOYMENT_FAILURE
