# appspec.yml - Instrucciones para AWS CodeDeploy
# Este archivo va en la raíz del proyecto
version: 0.0
os: linux

files:
  - source: backend/
    destination: /var/www/render-app/backend
    overwrite: true

hooks:
  # 1. Antes de instalar: detener la app actual
  BeforeInstall:
    - location: infra/scripts/stop_app.sh
      timeout: 30
      runas: root

  # 2. Después de instalar: instalar dependencias
  AfterInstall:
    - location: infra/scripts/install_deps.sh
      timeout: 120
      runas: root

  # 3. Arrancar la app nueva
  ApplicationStart:
    - location: infra/scripts/start_app.sh
      timeout: 60
      runas: root

  # 4. Validar que la app respondió bien
  ValidateService:
    - location: infra/scripts/validate.sh
      timeout: 30
      runas: root
